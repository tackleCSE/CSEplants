<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California Plants Matching Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 25px;
            overflow: hidden;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        h1 {
            color: #2e7d32;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #558b2f;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .instructions {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .plants-row {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .plant-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 220px;
            flex-shrink: 0;
        }
        
        .plant-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        
        .plant-images {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
        }
        
        .plant-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        
        .drop-zone {
            min-height: 60px;
            border: 2px dashed #8bc34a;
            border-radius: 8px;
            margin: 10px 15px 15px;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f8e9;
            transition: all 0.3s ease;
        }
        
        .drop-zone.highlight {
            background: #dcedc8;
            border-color: #689f38;
        }
        
        .names-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .plant-name {
            padding: 10px 18px;
            background: #689f38;
            color: white;
            border-radius: 25px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16);
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .plant-name:hover {
            background: #558b2f;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        
        .plant-name:active {
            cursor: grabbing;
            transform: scale(1.05);
        }
        
        .plant-name.dragging {
            opacity: 0.7;
        }
        
        .plant-name.placed {
            background: #388e3c;
            cursor: pointer;
        }
        
        .plant-name.wrong {
            background: #d32f2f;
        }
        
        .feedback-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .feedback {
            text-align: center;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 1.1rem;
            width: 100%;
            max-width: 600px;
        }
        
        .correct {
            color: #2e7d32;
            background: #e8f5e9;
            border: 2px solid #a5d6a7;
        }
        
        .incorrect {
            color: #c62828;
            background: #ffebee;
            border: 2px solid #ef9a9a;
        }
        
        .score-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: #689f38;
            text-align: center;
            padding: 10px;
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        
        .game-button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16);
        }
        
        .check-button {
            background: #689f38;
            color: white;
        }
        
        .check-button:hover {
            background: #558b2f;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        
        .reset-button {
            background: #0288d1;
            color: white;
        }
        
        .reset-button:hover {
            background: #0277bd;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }
        
        @media (max-width: 1200px) {
            .plants-row {
                justify-content: flex-start;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .plant-item {
                width: 180px;
            }
            
            .plant-image {
                height: 100px;
            }
            
            .button-container {
                flex-direction: column;
                align-items: center;
            }
            
            .game-button {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>

                    <button class="game-button reset-button" onclick="resetGame()">New Plants</button>
                </div>
            </div>
        </div>
    </div>

        // Game state
        let selectedPlants = [];
        let correctAnswers = {};
        let score = 0;
        let attempts = 0;
        let originalNameElements = {};
        
        // Initialize the game
        function initGame() {
            // Clear previous state
            document.getElementById('plants-row').innerHTML = '';
            document.getElementById('names-container').innerHTML = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').className = 'feedback';
            originalNameElements = {};
            
            // Select 5 random plants
            const shuffled = [...plants].sort(() => 0.5 - Math.random());
            selectedPlants = shuffled.slice(0, 5);
            correctAnswers = {};
            
            // Create plant items with two images each
            const plantsRow = document.getElementById('plants-row');
            
            selectedPlants.forEach((plant, index) => {
                const plantItem = document.createElement('div');
                plantItem.className = 'plant-item';
                plantItem.id = `plant-${index}`;
                
                const plantImages = document.createElement('div');
                plantImages.className = 'plant-images';
                
                // First image (top)
                const img1 = document.createElement('img');
                img1.className = 'plant-image';
                img1.src = plant.images[0];
                img1.alt = `Plant ${index} image 1`;
                plantImages.appendChild(img1);
                
                // Second image (bottom)
                const img2 = document.createElement('img');
                img2.className = 'plant-image';
                img2.src = plant.images[1];
                img2.alt = `Plant ${index} image 2`;
                plantImages.appendChild(img2);
                
                // Drop zone
                const dropZone = document.createElement('div');
                dropZone.className = 'drop-zone';
                dropZone.id = `drop-${index}`;
                dropZone.setAttribute('data-plant', plant.name);
                
                // Add drag and drop event listeners
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('highlight');
                });
                
                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('highlight');
                });
                
                dropZone.addEventListener('drop', drop);
                
                plantItem.appendChild(plantImages);
                plantItem.appendChild(dropZone);
                plantsRow.appendChild(plantItem);
                
                // Store correct answer
                correctAnswers[`drop-${index}`] = plant.name;
            });
            
            // Create draggable name elements
            const namesContainer = document.getElementById('names-container');
            
            // Shuffle the names
            const names = selectedPlants.map(p => p.name);
            names.sort(() => 0.5 - Math.random());
            
            names.forEach(name => {
                const nameElement = document.createElement('div');
                nameElement.className = 'plant-name';
                nameElement.draggable = true;
                const elementId = 'name-' + name.replace(/\s+/g, '-') + '-' + Math.random().toString(36).substr(2, 5);
                nameElement.id = elementId;
                nameElement.textContent = name;
                
                // Store original element reference
                originalNameElements[elementId] = nameElement;
                
                // Add drag event listener
                nameElement.addEventListener('dragstart', drag);
                
                // Add click event listener to return names
                nameElement.addEventListener('click', returnNameToPool);
                
                namesContainer.appendChild(nameElement);
            });
            
            // Update score display
            updateScore();
        }
        
        // Drag function
        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.classList.add('dragging');
        }
        
        // Drop function
        function drop(ev) {
            ev.preventDefault();
            ev.target.classList.remove('highlight');
            
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            
            // Remove from previous drop zone if it was there
            if (draggedElement.parentNode.classList.contains('drop-zone')) {
                returnNameToPool({ target: draggedElement });
            }
            
            // Clear the current drop zone
            ev.target.innerHTML = '';
            
            // Create a new element (to prevent duplicate IDs)
            const newElement = document.createElement('div');
            newElement.className = 'plant-name placed';
            newElement.textContent = draggedElement.textContent;
            newElement.setAttribute('data-original-id', data);
            
            // Add click event to return name to pool
            newElement.addEventListener('click', function() {
                returnNameToPool({ target: this });
            });
            
            // Add to drop zone
            ev.target.appendChild(newElement);
            
            // Hide the original dragged element
            draggedElement.style.display = 'none';
            draggedElement.classList.remove('dragging');
        }
        
        // Function to return name to pool
        function returnNameToPool(e) {
            const element = e.target;
            const originalId = element.getAttribute('data-original-id') || element.id;
            const originalElement = originalNameElements[originalId] || document.getElementById(originalId);
            
            if (originalElement) {
                originalElement.style.display = 'block';
                originalElement.classList.remove('wrong');
            }
            
            // If this was a placed element, remove it from drop zone
            if (element.parentNode.classList.contains('drop-zone')) {
                element.parentNode.innerHTML = '';
            }
        }
        
        // Check answers
        function checkAnswers() {
            const feedback = document.getElementById('feedback');
            let correctCount = 0;
            
            // Check each drop zone
            selectedPlants.forEach((plant, index) => {
                const dropZone = document.getElementById(`drop-${index}`);
                if (dropZone.firstChild) {
                    const isCorrect = dropZone.firstChild.textContent === correctAnswers[`drop-${index}`];
                    if (isCorrect) {
                        correctCount++;
                        dropZone.firstChild.classList.remove('wrong');
                        dropZone.firstChild.classList.add('placed');
                    } else {
                        dropZone.firstChild.classList.remove('placed');
                        dropZone.firstChild.classList.add('wrong');
                        
                        // Show the original name element again so it can be reused
                        const originalId = dropZone.firstChild.getAttribute('data-original-id');
                        if (originalId && originalNameElements[originalId]) {
                            originalNameElements[originalId].style.display = 'block';
                        }
                    }
                }
            });
            
            // Update attempts and score
            attempts++;
            if (correctCount === selectedPlants.length) {
                score++;
            }
            updateScore();
            
            // Display feedback
            if (correctCount === selectedPlants.length) {
                feedback.textContent = 'Perfect! All answers are correct!';
                feedback.className = 'feedback correct';
            } else if (correctCount > 0) {
                feedback.textContent = `You got ${correctCount} out of ${selectedPlants.length} correct. Try again!`;
                feedback.className = 'feedback incorrect';
            } else {
                feedback.textContent = 'None correct. Try again!';
                feedback.className = 'feedback incorrect';
            }
        }
        
        // Update score display
        function updateScore() {
            document.getElementById('score-display').textContent = `Score: ${score} correct out of ${attempts} attempts`;
        }
        
        // Reset game
        function resetGame() {
            initGame();
        }
        
        // Initialize on page load
        window.onload = initGame;
    </script>
